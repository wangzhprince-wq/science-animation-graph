<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普动画知识图谱 · 动态播放版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #0a0d14; color: #e8e8e8; overflow: hidden; }
        #graph { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 原有UI样式 */
        .legend { position: fixed; top: 20px; left: 20px; background: rgba(10,13,20,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 20px; font-size: 12px; z-index: 10; backdrop-filter: blur(12px); }
        .legend h3 { color: #fff; margin-bottom: 12px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; color: rgba(255,255,255,0.7); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .title-bar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,13,20,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; padding: 12px 28px; font-size: 13px; color: rgba(255,255,255,0.5); z-index: 10; backdrop-filter: blur(12px); text-align: center; }
        .controls { position: fixed; bottom: 100px; right: 20px; display: flex; gap: 8px; z-index: 10; flex-direction: column; }
        .ctrl-btn { background: rgba(10,13,20,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 14px; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .ctrl-btn:hover { background: rgba(78,205,196,0.15); border-color: rgba(78,205,196,0.3); color: #4ecdc4; }
        .info-panel { position: fixed; top: 20px; right: 20px; width: 280px; background: rgba(10,13,20,0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; font-size: 13px; z-index: 10; backdrop-filter: blur(12px); display: none; }
        .info-panel.visible { display: block; }
        .info-panel h3 { color: #4ecdc4; margin-bottom: 10px; font-size: 15px; }
        .info-panel .type-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-bottom: 10px; }
        .info-panel .desc { color: rgba(255,255,255,0.6); line-height: 1.6; }
        .info-panel .connections { margin-top: 12px; color: rgba(255,255,255,0.4); font-size: 12px; }
        .info-panel .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 18px; }

        /* ========== 新增：底部时间播放器样式 ========== */
        #timeline-controller { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 70%; max-width: 800px; background: rgba(15, 20, 30, 0.95); border: 1px solid rgba(78,205,196,0.3); padding: 15px 25px; border-radius: 20px; display: flex; align-items: center; gap: 20px; z-index: 100; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #play-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #4ecdc4; color: #000; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; box-shadow: 0 0 15px rgba(78,205,196,0.4); }
        #play-btn:hover { transform: scale(1.1); background: #fff; }
        #play-btn.playing { background: #f5a623; box-shadow: 0 0 15px rgba(245,166,35,0.4); }
        #time-slider { flex-grow: 1; cursor: pointer; accent-color: #4ecdc4; height: 6px; }
        #time-display { color: #fff; font-size: 16px; font-weight: bold; min-width: 130px; text-align: right; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

<!-- 图例 -->
<div class="legend">
    <h3>图例</h3>
    <div class="legend-item"><span class="legend-dot" style="background:#4ecdc4"></span>概念</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f5a623"></span>人物</div>
    <div class="legend-item"><span class="legend-dot" style="background:#ff6b9d"></span>书籍</div>
    <div class="legend-item"><span class="legend-dot" style="background:#9b59b6"></span>事件</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span>素材/媒体</div>
</div>

<div class="title-bar">
    科普纪录片图谱 &nbsp;|&nbsp; <strong>滑动底部时间轴查看演化</strong>
</div>

<!-- 右侧信息面板 -->
<div class="info-panel" id="infoPanel">
    <button class="close-btn" onclick="closePanel()">×</button>
    <h3 id="panelTitle">-</h3>
    <span class="type-tag" id="panelType">-</span>
    <p class="desc" id="panelDesc">-</p>
    <div class="connections" id="panelConn">-</div>
</div>

<!-- 右侧控制按钮 -->
<div class="controls">
    <button class="ctrl-btn" onclick="toggleLabels()">切换标签</button>
    <button class="ctrl-btn" onclick="resetView()">重置视角</button>
</div>

<!-- ========== 新增：底部时间播放器 ========== -->
<div id="timeline-controller">
    <button id="play-btn">▶</button>
    <input type="range" id="time-slider" min="0" max="100" value="0">
    <div id="time-display">加载中...</div>
</div>

<!-- D3 画布 -->
<svg id="graph"></svg>

<script src="https://cdn.bootcdn.net/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// 全局状态变量
let allNodes = [];
let allLinks = [];
let sortedTimes = [];
let currentTimeIndex = 0;
let isPlaying = false;
let playInterval;

// D3 变量
let svg, g, simulation;
let nodeElements, linkElements, labelElements;
let showLabels = true;

const typeColors = { concept: '#4ecdc4', person: '#f5a623', book: '#ff6b9d', event: '#9b59b6', media: '#e74c3c', episode: '#3498db' };
const typeBgColors = { concept: 'rgba(78,205,196,0.15)', person: 'rgba(245,166,35,0.15)', book: 'rgba(255,107,157,0.15)', event: 'rgba(155,89,182,0.15)', media: 'rgba(231,76,60,0.15)' };

// 1. 初始化入口
async function init() {
    try {
        const resp = await fetch('graph.json');
        const graphData = await resp.json();
        
        // 解析数据
        allNodes = graphData.nodes;
        allLinks = graphData.edges;

        // 清洗数据：提取所有时间点，如果没有时间默认给极小值
        let timeSet = new Set();
        allNodes.forEach(n => {
            if (n.time === undefined || n.time === null) n.time = -9999999999;
            timeSet.add(n.time);
        });

        // 时间从小到大排序
        sortedTimes = Array.from(timeSet).sort((a, b) => a - b);
        
        // 设置滑块的最大值
        const slider = document.getElementById('time-slider');
        slider.max = sortedTimes.length - 1;
        slider.value = 0;

        // 初始化D3环境
        initD3Canvas();
        
        // 绑定播放器事件
        setupPlayControls();

        // 初始渲染第一帧
        updateGraph(0);
        
    } catch(e) {
        document.body.innerHTML = '<p style="color:#e74c3c;padding:40px;z-index:999;position:relative;">图谱加载失败，请确保本地服务器已开启且有 graph.json 文件。错误信息: ' + e.message + '</p>';
    }
}

// 2. 初始化 D3 物理环境（不绑定数据）
function initD3Canvas() {
    const w = window.innerWidth, h = window.innerHeight;
    svg = d3.select('#graph').attr('width', w).attr('height', h);

    // 箭头定义
    const defs = svg.append('defs');
    defs.append('marker').attr('id','arrow').attr('viewBox','0 -4 8 8')
        .attr('refX',18).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6)
        .attr('orient','auto').append('path').attr('d','M0,-4L8,0L0,4').attr('fill','rgba(255,255,255,0.15)');

    g = svg.append('g');
    const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    // 空容器，用于稍后动态加入数据
    linkElements = g.append('g').selectAll('line');
    nodeElements = g.append('g').selectAll('circle');
    labelElements = g.append('g').selectAll('text');

    // 设定力导向引擎
    simulation = d3.forceSimulation()
        .force('link', d3.forceLink().id(d => d.id).distance(100).strength(0.4))
        .force('charge', d3.forceManyBody().strength(-280))
        .force('center', d3.forceCenter(w/2, h/2))
        .force('collision', d3.forceCollide().radius(35));

    // 每帧物理计算位置
    simulation.on('tick', () => {
        linkElements.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeElements.attr('cx', d => d.x).attr('cy', d => d.y);
        labelElements.attr('x', d => d.x).attr('y', d => d.y);
    });
}

// 3. 核心动态渲染逻辑（时间驱动）
function updateGraph(timeIndex) {
    currentTimeIndex = timeIndex;
    const currentTime = sortedTimes[timeIndex];
    
    // UI 更新时间显示
    updateTimeDisplay(currentTime);

    // 过滤出当前时间可见的节点
    const visibleNodes = allNodes.filter(n => n.time <= currentTime);
    const visibleNodeIds = new Set(visibleNodes.map(n => n.id));
    
    // 过滤出两端都可见的连线
    const visibleLinks = allLinks.filter(l => {
        const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
        const targetId = typeof l.target === 'object' ? l.target.id : l.target;
        return visibleNodeIds.has(sourceId) && visibleNodeIds.has(targetId);
    });

    // --- D3 动态更新数据 (d3.join) ---

    // 连线更新
    linkElements = g.selectAll('line').data(visibleLinks, d => {
        const sid = typeof d.source === 'object' ? d.source.id : d.source;
        const tid = typeof d.target === 'object' ? d.target.id : d.target;
        return sid + '-' + tid;
    });
    linkElements = linkElements.join(
        enter => enter.append('line')
            .attr('stroke', 'rgba(255,255,255,0.12)')
            .attr('stroke-width', 1.5)
            .attr('marker-end', 'url(#arrow)')
            .attr('opacity', 0).call(e => e.transition().duration(800).attr('opacity', 1)),
        update => update,
        exit => exit.remove()
    );

    // 节点更新
    nodeElements = g.selectAll('circle').data(visibleNodes, d => d.id);
    nodeElements = nodeElements.join(
        enter => {
            const circle = enter.append('circle')
                .attr('r', d => d.type === 'event' ? 14 : 10)
                .attr('fill', d => typeColors[d.type] || '#888')
                .attr('stroke', d => typeColors[d.type] || '#888')
                .attr('stroke-width', 2)
                .attr('opacity', 0)
                .attr('cursor', 'pointer')
                .on('click', (e, d) => showInfo(d))
                .call(d3.drag()
                    .on('start', (e,d) => { e.active && simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e,d) => { e.active && simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
            
            // 节点淡入动画
            circle.transition().duration(800).attr('opacity', 0.85);

            // 🌟 核心：如果是新出现的“事件”，触发纪录片级的高亮放大特效
            circle.filter(d => d.type === 'event')
                .transition().duration(200).attr('r', 30).attr('stroke', '#fff').attr('stroke-width', 5) // 爆炸闪动
                .transition().duration(1000).attr('r', 14).attr('stroke', typeColors['event']).attr('stroke-width', 2); // 恢复原状

            return circle;
        },
        update => update,
        exit => exit.remove()
    );

    // 标签文字更新
    labelElements = g.selectAll('text').data(visibleNodes, d => d.id);
    labelElements = labelElements.join(
        enter => enter.append('text')
            .text(d => d.label)
            .attr('font-size', 11)
            .attr('fill', 'rgba(255,255,255,0.8)')
            .attr('text-anchor', 'middle')
            .attr('dy', 22)
            .style('display', showLabels ? null : 'none')
            .attr('opacity', 0).call(e => e.transition().duration(800).attr('opacity', 1)),
        update => update,
        exit => exit.remove()
    );

    // 重新将数据喂给物理引擎并加热
    simulation.nodes(visibleNodes);
    simulation.force('link').links(visibleLinks);
    simulation.alpha(0.3).restart(); 
}

// 4. 播放器控件逻辑
function setupPlayControls() {
    const playBtn = document.getElementById('play-btn');
    const slider = document.getElementById('time-slider');

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        if(isPlaying) {
            playBtn.innerText = '⏸';
            playBtn.classList.add('playing');
            
            // 如果已经播到底了，从头开始
            if(slider.value >= sortedTimes.length - 1) {
                slider.value = 0;
            }

            playInterval = setInterval(() => {
                let val = parseInt(slider.value);
                if(val < sortedTimes.length - 1) {
                    val++;
                    slider.value = val;
                    updateGraph(val);
                } else {
                    // 播放完毕停止
                    playBtn.click(); 
                }
            }, 1500); // 🌟 这里控制播放速度，1.5秒弹出一个新事件节点
        } else {
            playBtn.innerText = '▶';
            playBtn.classList.remove('playing');
            clearInterval(playInterval);
        }
    });

    slider.addEventListener('input', (e) => {
        updateGraph(parseInt(e.target.value));
    });
}

// 时间文本格式化
function updateTimeDisplay(time) {
    let str = "";
    if (time === -9999999999) {
        str = "远古时期";
    } else if (time < 0) {
        let absTime = Math.abs(time);
        if (absTime >= 100000000) str = (absTime / 100000000).toFixed(1) + " 亿年前";
        else if (absTime >= 10000) str = (absTime / 10000).toFixed(1) + " 万年前";
        else str = absTime + " 年前";
    } else {
        str = time + " 年";
    }
    document.getElementById('time-display').innerText = str;
}

// 5. 辅助 UI 功能保持不变
function showInfo(d) {
    const panel = document.getElementById('infoPanel');
    document.getElementById('panelTitle').textContent = d.label;
    document.getElementById('panelType').textContent = d.type;
    document.getElementById('panelType').style.background = typeBgColors[d.type] || 'rgba(136,136,136,0.15)';
    document.getElementById('panelType').style.color = typeColors[d.type] || '#888';
    document.getElementById('panelDesc').textContent = d.desc || '无描述';
    panel.classList.add('visible');
}

function closePanel() { document.getElementById('infoPanel').classList.remove('visible'); }
function toggleLabels() { showLabels = !showLabels; labelElements.style('display', showLabels ? null : 'none'); }
function resetView() { svg.transition().duration(600).call(d3.zoom().transform, d3.zoomIdentity); }

window.addEventListener('resize', () => {
    svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
    simulation.force('center', d3.forceCenter(window.innerWidth/2, window.innerHeight/2));
    simulation.alpha(0.3).restart();
});

// 启动
init();
</script>
</body>
</html>
